<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>路跑活動</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #000000);
      --hint: var(--tg-theme-hint-color, #999999);
      --btn-bg: var(--tg-theme-button-color, #0088cc);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #loading, #error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
      color: var(--hint);
      font-size: 15px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--secondary-bg);
      border-top-color: var(--btn-bg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #wrapper {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .counter-bar {
      text-align: center;
      padding: 10px 0 6px;
      font-size: 13px;
      color: var(--hint);
      flex-shrink: 0;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 0 0 8px;
      flex-shrink: 0;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--secondary-bg);
      transition: background 0.2s;
    }
    .dot.active { background: var(--btn-bg); }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      scrollbar-width: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    .card {
      scroll-snap-align: start;
      min-width: 100vw;
      padding: 16px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .fields { display: flex; flex-direction: column; gap: 10px; }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 2px;
    }

    .field-value { font-size: 15px; }

    .reg-btn {
      display: block;
      background: var(--btn-bg);
      color: var(--btn-text);
      text-align: center;
      padding: 13px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>載入中…</span></div>
  <div id="error" style="display:none">暫無活動資料</div>

  <div id="wrapper">
    <div class="counter-bar" id="counter"></div>
    <div class="dots" id="dots"></div>
    <div class="carousel" id="carousel"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.disableVerticalSwipes();

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'open';
    const city = params.get('city') || 'all';

    fetch(`/api/events?type=${encodeURIComponent(type)}&city=${encodeURIComponent(city)}`, {
      headers: { 'Authorization': tg.initData }
    })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => render(data.events))
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
      });

    function render(events) {
      document.getElementById('loading').style.display = 'none';

      if (!events || events.length === 0) {
        const el = document.getElementById('error');
        el.textContent = type === 'upcoming'
          ? '目前 30 天內沒有即將開放報名的活動'
          : '目前沒有可報名的路跑活動';
        el.style.display = 'flex';
        return;
      }

      const carousel = document.getElementById('carousel');
      const dotsEl = document.getElementById('dots');
      const counterEl = document.getElementById('counter');
      const total = events.length;

      events.forEach((e, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">${esc(e.name)}</div>
          <div class="fields">
            <div>
              <div class="field-label">活動日期</div>
              <div class="field-value">${esc(e.race_date)}</div>
            </div>
            <div>
              <div class="field-label">地點</div>
              <div class="field-value">${esc(e.location)}</div>
            </div>
            <div>
              <div class="field-label">報名期間</div>
              <div class="field-value">${esc(e.reg_start)} ～ ${esc(e.reg_end)}</div>
            </div>
          </div>
          <a class="reg-btn" href="${safeUrl(e.url)}" target="_blank">前往報名頁面</a>
        `;
        carousel.appendChild(card);

        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(dot);
      });

      counterEl.textContent = `1 / ${total}`;
      document.getElementById('wrapper').style.display = 'flex';

      const dots = dotsEl.querySelectorAll('.dot');
      carousel.addEventListener('scroll', () => {
        const idx = Math.round(carousel.scrollLeft / carousel.clientWidth);
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        counterEl.textContent = `${idx + 1} / ${total}`;
      }, { passive: true });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function safeUrl(url) {
      try {
        const u = new URL(url);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
      } catch { return '#'; }
    }
  </script>
</body>
</html>
